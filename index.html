<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0">
<title>TemplateOG</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f8f9fc;--card:#fff;--primary:#2d3436;--accent:#6c5ce7;--accent2:#0984e3;--border:#eef1f5;--text:#2d3436;--muted:#8895a7;--radius:16px;--shadow:0 2px 20px rgba(0,0,0,.06)}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.6}
header{background:linear-gradient(135deg,#2d3436 0%,#636e72 100%);color:#fff;padding:3rem 1.5rem 2rem;text-align:center;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(circle,rgba(255,255,255,.04) 0%,transparent 70%);pointer-events:none}
header h1{font-size:2.4rem;font-weight:800;letter-spacing:-.5px;margin-bottom:.3rem}
header p{font-size:.95rem;opacity:.7;font-weight:300}
.controls{max-width:820px;margin:0 auto;padding:1.2rem 1rem 0}
.search-wrap{position:relative;max-width:480px;margin:0 auto}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);width:18px;height:18px;color:var(--muted);pointer-events:none}
.search-wrap input{width:100%;padding:.7rem 1rem .7rem 2.6rem;border:2px solid var(--border);border-radius:12px;font-size:.9rem;outline:none;transition:border-color .2s;background:var(--card)}
.search-wrap input:focus{border-color:var(--accent)}
.stats{max-width:820px;margin:.6rem auto 0;padding:0 1rem;font-size:.8rem;color:var(--muted);text-align:center}
.c{max-width:820px;margin:0 auto;padding:1rem 1rem 3rem}
.g{display:flex;flex-direction:column;gap:10px}
.tc{background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);transition:box-shadow .2s}
.tc:hover{box-shadow:0 4px 24px rgba(0,0,0,.07)}
.th{padding:.85rem 1.2rem;cursor:pointer;display:flex;align-items:center;gap:12px;background:var(--card);user-select:none;-webkit-tap-highlight-color:transparent}
.th .no{display:inline-flex;width:28px;height:28px;background:var(--accent);color:#fff;border-radius:8px;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;flex-shrink:0;transition:background .2s}
.open .th .no{background:var(--accent2)}
.th .tm{font-size:.9rem;font-weight:600;flex:1;color:var(--text)}
.th .li{display:flex;gap:4px;flex-shrink:0}
.th .lb{font-size:.6rem;padding:2px 8px;border-radius:20px;font-weight:600;letter-spacing:.3px}
.lb.e{background:#dfe6e9;color:#2d3436}
.lb.a{background:#b2bec3;color:#2d3436}
.th .ar{font-size:.8rem;color:#bdc3c7;transition:transform .3s,color .2s;flex-shrink:0;width:20px;text-align:center}
.open .ar{transform:rotate(180deg);color:var(--accent)}
.tb{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .3s ease;padding:0 1.2rem}
.open .tb{max-height:3000px;padding:0 1.2rem 1rem}
.ls{margin-bottom:.75rem}
.ls:last-child{margin-bottom:0}
.lsh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.5rem;flex-wrap:wrap;gap:6px}
.lsh .ll{font-weight:700;font-size:.75rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.cb{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border:none;border-radius:8px;cursor:pointer;font-size:.75rem;font-weight:600;transition:all .15s;background:#f1f3f5;color:#555}
.cb:hover{background:#e9ecef;transform:translateY(-1px)}
.cb.ok{background:#00b894;color:#fff;transform:none}
.cb svg{width:12px;height:12px}
.ec{background:#fafbfc;border-radius:12px;padding:1.2rem 1.5rem;font-size:.88rem;line-height:1.9;white-space:pre-wrap;font-family:'Georgia','Times New Roman',serif;border-left:4px solid var(--accent);border-top:1px solid var(--border);border-right:1px solid var(--border);border-bottom:1px solid var(--border);color:#2d3436}
.ft{text-align:center;padding:2rem 1rem;color:#bdc3c7;font-size:.78rem;border-top:1px solid var(--border)}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-state svg{width:48px;height:48px;margin-bottom:1rem;opacity:.4}
.empty-state p{font-size:.9rem}
@media(max-width:600px){header{padding:2rem 1rem 1.5rem}header h1{font-size:1.7rem}.th{padding:.75rem 1rem;gap:8px}.th .no{width:24px;height:24px;font-size:.65rem;border-radius:6px}.th .tm{font-size:.82rem}.tb{padding:0 1rem}.open .tb{padding:0 1rem .75rem}.ec{font-size:.82rem;padding:.9rem 1.1rem;line-height:1.75}.c{padding:.5rem 1rem 2rem}.controls{padding:.8rem 1rem 0}}</style>
</head>

<script>
var D=[{"id": 1, "title": "Request for Product Quotation", "titleAz": "Məhsul Üçün Qiymət Təklifi Sorğusu", "en": "Subject: Request for Product Quotation\n\nDear Sir/Madam,\n\nPlease review the attached document and provide a quotation for a product that meets the specified parameters.\n\nAdditionally, please advise:\n\n- Whether the product is available in stock;\n- Delivery options to Azerbaijan by air and road freight;\n- Manufacturing/lead time;\n- Estimated delivery time.\n\nWe look forward to your quotation.\n\nBest regards,\n[Your Name]\n[Company Name]", "az": "Mövzu: Məhsul Üçün Qiymət Təklifi Sorğusu\n\nHörmətli cənab/xanım,\n\nƏlavə olunmuş sənədi nəzərdən keçirib göstərilən parametrlərə uyğun məhsul üçün qiymət təklifi təqdim edəsiniz.\n\nƏlavə olaraq, aşağıdakıları bildirəsiniz:\n\n- Məhsulun stokda olub-olmaması;\n- Azərbaycana hava və quru yolu ilə çatdırılma variantları;\n- İstehsal/çatdırılma müddəti;\n- Təxmini çatdırılma vaxtı.\n\nQiymət təklifinizi gözləyirik.\n\nHörmətlə,\n[Adınız]\n[Şirkət Adı]"}, {"id": 2, "title": "Alternative Item Inquiry", "titleAz": "Alternativ Məhsul Sorğusu", "en": "Subject: Alternative Item Inquiry\n\nDear Sir/Madam,\n\nPlease confirm if an alternative item is acceptable for your requirement.\n\nAdditionally, please advise:\n\n- Specifications of the preferred alternative;\n- Quantity required;\n- Expected delivery timeline.\n\nWe look forward to your feedback.\n\nBest regards,\n[Name]", "az": "Mövzu: Alternativ Məhsul Sorğusu\n\nHörmətli cənab/xanım,\n\nAlternativ məhsulun tələbinizə uyğun olub-olmadığını təsdiqləyin.\n\nƏlavə olaraq, aşağıdakıları bildirəsiniz:\n\n- Üstünlük verilən alternativin xüsusiyyətləri;\n- Tələb olunan miqdar;\n- Gözlənilən çatdırılma müddəti.\n\nCavabınızı gözləyirik.\n\nHörmətlə,\n[Ad]"}, {"id": 3, "title": "Best Price Request", "titleAz": "Ən Yaxşı Qiymət Tələbi", "en": "Subject: Best Price Request\n\nDear Sir/Madam,\n\nThank you for your quotation. Kindly review and provide your best possible price to support our approval process.\n\nAdditionally, please confirm:\n\n- Validity period of the offered price;\n- Any volume discount available;\n- Payment terms and conditions.\n\nWe look forward to your revised offer.\n\nBest regards,\n[Name]", "az": "Mövzu: Ən Yaxşı Qiymət Tələbi\n\nHörmətli cənab/xanım,\n\nTəklifinizə görə təşəkkür edirik. Zəhmət olmasa, ən sərfəli qiymətinizi təqdim edin.\n\nƏlavə olaraq, aşağıdakıları təsdiqləyin:\n\n- Təklif olunan qiymətin qüvvə müddəti;\n- Həcm endirimi imkanı;\n- Ödəniş şərtləri.\n\nYenilənmiş təklifinizi gözləyirik.\n\nHörmətlə,\n[Ad]"}, {"id": 4, "title": "Final Offer Request", "titleAz": "Son Qiymət Təklifi", "en": "Subject: Final Offer Request\n\nDear Sir/Madam,\n\nPlease provide your final commercial offer at your earliest convenience to proceed with our internal process.\n\nAdditionally, please specify:\n\n- Unit price and total amount;\n- Delivery terms (Incoterms);\n- Payment terms;\n- Offer validity.\n\nThank you for your cooperation.\n\nBest regards,\n[Name]", "az": "Mövzu: Son Qiymət Təklifi\n\nHörmətli cənab/xanım,\n\nDaxili prosesimizi davam etdirmək üçün son qiymət təklifinizi mümkün qədər tez təqdim edin.\n\nƏlavə olaraq, aşağıdakıları qeyd edin:\n\n- Vahid qiyməti və ümumi məbləğ;\n- Çatdırılma şərtləri (Incoterms);\n- Ödəniş şərtləri;\n- Təklifin qüvvə müddəti.\n\nƏməkdaşlığınız üçün təşəkkür edirik.\n\nHörmətlə,\n[Ad]"}, {"id": 5, "title": "Delivery Time Inquiry", "titleAz": "Çatdırılma Müddəti Sorğusu", "en": "Subject: Delivery Time Inquiry\n\nDear Sir/Madam,\n\nPlease provide the delivery time and confirm the shipping schedule for our order.\n\nAdditionally, please advise:\n\n- Estimated dispatch date;\n- Expected arrival date;\n- Shipping method and tracking details.\n\nYour prompt response will help us proceed efficiently.\n\nThank you.\n\nBest regards,\n[Name]", "az": "Mövzu: Çatdırılma Müddəti Sorğusu\n\nHörmətli cənab/xanım,\n\nSifarişimizin çatdırılma müddətini bildirin və göndərmə cədvəlini təsdiqləyin.\n\nƏlavə olaraq, aşağıdakıları bildirəsiniz:\n\n- Təxmini göndərmə tarixi;\n- Gözlənilən gəliş tarixi;\n- Daşıma üsulu və izləmə məlumatları.\n\nTez cavabınız proseslərimizi sürətləndirəcək.\n\nHörmətlə,\n[Ad]"}, {"id": 6, "title": "Stock Availability Inquiry", "titleAz": "Stok Mövcudluğu Sorğusu", "en": "Subject: Stock Availability Inquiry\n\nDear Sir/Madam,\n\nPlease advise the current stock availability for the items below and confirm the lead time.\n\nAdditionally, please confirm:\n\n- Available quantity in stock;\n- Expected restock date (if out of stock);\n- Minimum order quantity.\n\nWe look forward to your update.\n\nBest regards,\n[Name]", "az": "Mövzu: Stok Mövcudluğu Sorğusu\n\nHörmətli cənab/xanım,\n\nMəhsulların hazırda stok mövcudluğunu və təslim müddətini bildirin.\n\nƏlavə olaraq, aşağıdakıları təsdiqləyin:\n\n- Stokda olan miqdar;\n- Stok yoxdursa, təxmini yenilənmə tarixi;\n- Minimum sifariş miqdarı.\n\nCavabınızı gözləyirik.\n\nHörmətlə,\n[Ad]"}, {"id": 7, "title": "Offer Rejection", "titleAz": "Təklifin Rəddi", "en": "Subject: Offer Rejection\n\nDear Sir/Madam,\n\nThank you for your offer. After review, we regret to inform you that we are unable to proceed with your proposal at this time.\n\nPlease note:\n\n- We may revisit this in future tenders;\n- We encourage you to participate in upcoming opportunities.\n\nWe hope to collaborate on future projects.\n\nBest regards,\n[Name]", "az": "Mövzu: Təklifin Rəddi\n\nHörmətli cənab/xanım,\n\nTəklifinizə görə təşəkkür edirik. Təəssüflə bildiririk ki, hazırki mərhələdə təklifinizi qəbul edə bilmirik.\n\nQeyd edək:\n\n- Gələcək tenderlərdə yenidən qiymətləndirə bilərik;\n- Qarşıdan gələn fürsətlərdə iştirakınızı tövsiyə edirik.\n\nGələcək layihələrdə əməkdaşlıq ümidi ilə.\n\nHörmətlə,\n[Ad]"}, {"id": 8, "title": "Warranty Claim", "titleAz": "Zəmanət Müraciəti", "en": "Subject: Warranty Claim\n\nDear Sir/Madam,\n\nWe wish to file a warranty claim regarding the product below. Please advise on the required steps and documentation.\n\nProduct Details:\n\n- Product: [Product Name]\n- Invoice: [Invoice Number]\n- Issue: [Description]\n\nWe look forward to your guidance.\n\nBest regards,\n[Name]", "az": "Mövzu: Zəmanət Müraciəti\n\nHörmətli cənab/xanım,\n\nAşağıdakı məhsul üçün zəmanət müraciəti etmək istəyirik. Tələb olunan addımları və sənədləri bildirin.\n\nMəhsul Məlumatları:\n\n- Məhsul: [Məhsul Adı]\n- Faktura: [Faktura Nömrəsi]\n- Problem: [Təsvir]\n\nHörmətlə,\n[Ad]"}, {"id": 9, "title": "Quality Complaint", "titleAz": "Keyfiyyət Şikayəti", "en": "Subject: Quality Complaint\n\nDear Sir/Madam,\n\nWe regret to report a quality issue with the delivered product. Please find the details below and advise on corrective action.\n\nOrder Details:\n\n- Order: [Order Number]\n- Issue: [Description]\n- Affected Quantity: [Quantity]\n\nWe kindly request a replacement or refund as per the agreement.\n\nBest regards,\n[Name]", "az": "Mövzu: Keyfiyyət Şikayəti\n\nHörmətli cənab/xanım,\n\nTəəssüflə bildiririk ki, çatdırılan məhsulda keyfiyyət problemi aşkar edilmişdir.\n\nSifariş Məlumatları:\n\n- Sifariş: [Sifariş Nömrəsi]\n- Problem: [Təsvir]\n- Təsir edən miqdar: [Miqdar]\n\nRazılaşmaya əsasən dəyişdirilmə və ya geri qaytarılma xahiş edirik.\n\nHörmətlə,\n[Ad]"}, {"id": 10, "title": "Supplier Registration", "titleAz": "Təchizatçı Qeydiyyatı", "en": "Subject: Supplier Registration Request\n\nDear Sir/Madam,\n\nWe would like to register your company as a potential supplier in our procurement system.\n\nPlease provide the following documents:\n\n- Company profile and catalogue;\n- Tax registration certificate;\n- Quality certifications (ISO, etc.);\n- Bank details;\n- Reference list.\n\nWe look forward to a mutually beneficial partnership.\n\nBest regards,\n[Name]", "az": "Mövzu: Təchizatçı Qeydiyyatı Sorğusu\n\nHörmətli cənab/xanım,\n\nŞirkətinizi potensial təchizatçı kimi qeydiyyatdan keçirmək istəyirik.\n\nAşağıdakı sənədləri təqdim edəsiniz:\n\n- Şirkət profili və kataloqu;\n- Vergi qeydiyyat şəhadətnaməsi;\n- Keyfiyyət sertifikatları (ISO və s.);\n- Bank məlumatları;\n- İstinad siyahısı.\n\nQarşılıqlı faydalı əməkdaşlıq ümidi ilə.\n\nHörmətlə,\n[Ad]"}, {"id": 11, "title": "Inquiry Follow-Up", "titleAz": "Sorğu Təkibi", "en": "Subject: Inquiry Follow-Up\n\nDear Sir/Madam,\n\nWe previously sent a product inquiry on [Date] and would appreciate an update on its status.\n\nPlease confirm:\n\n- Whether the quotation is being prepared;\n- If any additional information is required from our side.\n\nWe look forward to your prompt response.\n\nBest regards,\n[Name]", "az": "Mövzu: Sorğu Təkibi\n\nHörmətli cənab/xanım,\n\n[Tarix] tarixində məhsul sorğusu göndərmişdik. Vəziyyəti barədə məlumat verəsiniz.\n\nTəsdiqləyin:\n\n- Qiymət təklifinin hazırlanıb-hazırlanmadığı;\n- Əlavə məlumata ehtiyac olub-olmaması.\n\nTez cavabınızı gözləyirik.\n\nHörmətlə,\n[Ad]"}, {"id": 12, "title": "Order Confirmation", "titleAz": "Sifariş Təsdiqi", "en": "Subject: Order Confirmation\n\nDear Sir/Madam,\n\nWe are pleased to confirm our order as per the agreed terms.\n\nOrder Summary:\n\n- Order Reference: [Order Number]\n- Item: [Product Name]\n- Quantity: [Quantity]\n- Unit Price: [Price]\n- Total Amount: [Total]\n- Delivery Date: [Date]\n\nPlease send the proforma invoice and confirm the shipping schedule.\n\nBest regards,\n[Name]", "az": "Mövzu: Sifariş Təsdiqi\n\nHörmətli cənab/xanım,\n\nRazılaşdırılmış şərtlərə əsasən sifarişimizi təsdiq edirik.\n\nSifariş Xülasəsi:\n\n- Sifariş İstinadı: [Sifariş Nömrəsi]\n- Məhsul: [Məhsul Adı]\n- Miqdar: [Miqdar]\n- Vahid Qiyməti: [Qiymət]\n- Ümumi Məbləğ: [Məbləğ]\n- Çatdırılma Tarixi: [Tarix]\n\nProforma fakturanı göndərib göndərmə cədvəlini təsdiqləyin.\n\nHörmətlə,\n[Ad]"}, {"id": 13, "title": "Shipping Instruction", "titleAz": "Göndəriş Təlimatı", "en": "Subject: Shipping Instruction\n\nDear Sir/Madam,\n\nPlease arrange shipment for the following order as per the instructions below.\n\nShipping Details:\n\n- Order Reference: [Order Number];\n- Shipping Method: [Air / Road / Sea];\n- Destination: [Address];\n- Required Delivery Date: [Date].\n\nPlease confirm the shipping arrangement and provide tracking information.\n\nThank you.\n\nBest regards,\n[Name]", "az": "Mövzu: Göndəriş Təlimatı\n\nHörmətli cənab/xanım,\n\nAşağıdakı sifarişin göndərilməsini təşkil edəsiniz.\n\nGöndəriş Məlumatları:\n\n- Sifariş İstinadı: [Sifariş Nömrəsi];\n- Daşıma Üsulu: [Hava / Quru / Dəniz];\n- Təyinat: [Ünvan];\n- Tələb olunan çatdırılma tarixi: [Tarix].\n\nGöndəriş təşkilatını təsdiqləyib izləmə məlumatını təqdim edin.\n\nHörmətlə,\n[Ad]"}, {"id": 14, "title": "Payment Reminder", "titleAz": "Ödəniş Xatırlatması", "en": "Subject: Payment Reminder\n\nDear Sir/Madam,\n\nThis is a friendly reminder regarding the outstanding payment for invoice [Invoice Number] dated [Date].\n\nInvoice Details:\n\n- Invoice Amount: [Amount];\n- Due Date: [Due Date];\n- Outstanding Balance: [Balance].\n\nPlease process the payment at your earliest convenience. Kindly confirm the payment date.\n\nThank you for your attention.\n\nBest regards,\n[Name]", "az": "Mövzu: Ödəniş Xatırlatması\n\nHörmətli cənab/xanım,\n\n[Tarix] tarixli [Faktura Nömrəsi] nömrəli faktura üzrə ödənişi xatırlatmaq istəyirik.\n\nFaktura Məlumatları:\n\n- Faktura Məbləği: [Məbləğ];\n- Son Ödəniş Tarixi: [Tarix];\n- Qalıq Məbləğ: [Qalıq].\n\nÖdənişi mümkün qədər tez həyata keçirəsiniz. Ödəniş tarixini təsdiqləyin.\n\nHörmətlə,\n[Ad]"}, {"id": 15, "title": "Invoice Correction", "titleAz": "Faktura Düzəlişi", "en": "Subject: Invoice Correction Request\n\nDear Sir/Madam,\n\nWe have identified a discrepancy in the invoice [Invoice Number]. Please find the details below and issue a corrected invoice.\n\nDiscrepancy Details:\n\n- Invoice Item: [Item];\n- Incorrect Value: [Value];\n- Correct Value: [Correct Value].\n\nWe kindly request a credit note or revised invoice at your earliest convenience.\n\nBest regards,\n[Name]", "az": "Mövzu: Faktura Düzəlişi Sorğusu\n\nHörmətli cənab/xanım,\n\n[Faktura Nömrəsi] nömrəli fakturada uyğunsuzluq aşkar etdik.\n\nUyğunsuzluq Məlumatları:\n\n- Faktura Maddəsi: [Maddə];\n- Səhv Dəyər: [Dəyər];\n- Düzgün Dəyər: [Düzgün Dəyər].\n\nMümkün qədər tez düzəliş edilmiş faktura göndərməyinizi xahiş edirik.\n\nHörmətlə,\n[Ad]"}, {"id": 16, "title": "Back Order", "titleAz": "Geri Sifariş", "en": "Subject: Back Order Notification\n\nDear Sir/Madam,\n\nWe regret to inform you that the following item from your order is currently out of stock and will be placed on back order.\n\nDetails:\n\n- Order Reference: [Order Number];\n- Item: [Product Name];\n- Estimated Restock Date: [Date].\n\nWe will notify you once the stock becomes available. We apologize for the inconvenience.\n\nBest regards,\n[Name]", "az": "Mövzu: Geri Sifariş Bildirişi\n\nHörmətli cənab/xanım,\n\nSifarişinizdəki aşağıdakı məhsulun hazırda stokda olmadığını və geri sifarişə qoyulacağını bildiririk.\n\nMəlumatlar:\n\n- Sifariş İstinadı: [Sifariş Nömrəsi];\n- Məhsul: [Məhsul Adı]\n- Təxmini Yenilənmə Tarixi: [Tarix].\n\nStok yeniləndikdə məlumat verəcəyik. Narahatlıq üçün üzr istəyirik.\n\nHörmətlə,\n[Ad]"}, {"id": 17, "title": "Order Cancellation", "titleAz": "Sifariş Ləğvi", "en": "Subject: Order Cancellation\n\nDear Sir/Madam,\n\nDue to [Reason], we must cancel our order [Order Reference]. Please confirm the cancellation and advise if any charges apply.\n\nOrder Details:\n\n- Order Reference: [Order Number];\n- Item: [Product Name];\n- Cancellation Reason: [Reason].\n\nWe apologize for any inconvenience caused.\n\nBest regards,\n[Name]", "az": "Mövzu: Sifariş Ləğvi\n\nHörmətli cənab/xanım,\n\n[Səbəb] səbəbindən [Sifariş İstinadı] nömrəli sifarişimizi ləğv etməliyik.\n\nSifariş Məlumatları:\n\n- Sifariş İstinadı: [Sifariş Nömrəsi];\n- Məhsul: [Məhsul Adı];\n- Ləğv Səbəbi: [Səbəb].\n\nLəğvi təsdiqləyin və hər hansı ödəniş olarsa bildirin.\n\nHörmətlə,\n[Ad]"}, {"id": 18, "title": "Late Delivery", "titleAz": "Gecikmiş Çatdırılma", "en": "Subject: Late Delivery Notification\n\nDear Sir/Madam,\n\nWe regret to inform you that delivery for order [Order Reference] is delayed.\n\nUpdated Schedule:\n\n- Original Delivery Date: [Original Date];\n- Revised Delivery Date: [New Date];\n- Reason for Delay: [Reason].\n\nWe apologize for the inconvenience and are working to minimize the delay.\n\nBest regards,\n[Name]", "az": "Mövzu: Gecikmiş Çatdırılma Bildirişi\n\nHörmətli cənab/xanım,\n\n[Sifariş İstinadı] üzrə çatdırılmanın gecikdiyini bildiririk.\n\nYenilənmiş Cədvəl:\n\n- Planlaşdırılan Tarix: [Əvvəlki Tarix];\n- Yenilənmiş Tarix: [Yeni Tarix];\n- Gecikmə Səbəbi: [Səbəb].\n\nNarahatlıq üçün üzr istəyir, gecikməni azaltmaq üçün çalışırıq.\n\nHörmətlə,\n[Ad]"}, {"id": 19, "title": "Sample Request", "titleAz": "Nümunə Tələbi", "en": "Subject: Sample Request\n\nDear Sir/Madam,\n\nPlease provide samples of the following products for evaluation.\n\nSample Requirements:\n\n1. [Product 1] - Quantity: [Qty];\n2. [Product 2] - Quantity: [Qty].\n\nAdditionally, please advise:\n\n- If any sample charges apply;\n- Estimated delivery time for samples.\n\nWe look forward to your response.\n\nBest regards,\n[Name]", "az": "Mövzu: Nümunə Tələbi\n\nHörmətli cənab/xanım,\n\nQiymətləndirmə üçün aşağıdakı məhsulların nümunələrini təqdim edin.\n\nTələb Olunan Nümunələr:\n\n1. [Məhsul 1] - Miqdar: [Say];\n2. [Məhsul 2] - Miqdar: [Say].\n\nƏlavə olaraq, bildirəsiniz:\n\n- Nümunə haqqı olub-olmaması;\n- Nümunələrin çatdırılma müddəti.\n\nHörmətlə,\n[Ad]"}, {"id": 20, "title": "Price Revision", "titleAz": "Qiymət Yeniləməsi", "en": "Subject: Price Revision Request\n\nDear Sir/Madam,\n\nDue to [reason], we kindly request a revision of the current pricing for [Product Name].\n\nPricing Details:\n\n- Current Price: [Current Price];\n- Proposed Price: [New Price];\n- Reason for Revision: [Reason].\n\nWe look forward to your response.\n\nBest regards,\n[Name]", "az": "Mövzu: Qiymət Yeniləmə Sorğusu\n\nHörmətli cənab/xanım,\n\n[Səbəb] səbəbindən [Məhsul Adı] üçün qiymətin yenilənməsini xahiş edirik.\n\nQiymət Məlumatları:\n\n- Cari Qiymət: [Cari Qiymət];\n- Təklif Edilən Qiymət: [Yeni Qiymət];\n- Yeniləmə Səbəbi: [Səbəb].\n\nHörmətlə,\n[Ad]"}, {"id": 21, "title": "Bid Extension", "titleAz": "Təklif Müddətinin Uzadılması", "en": "Subject: Bid Extension Request\n\nDear Sir/Madam,\n\nWe kindly request an extension of the bid deadline for [Tender Reference].\n\nExtension Details:\n\n- Current Deadline: [Current Date];\n- Proposed New Date: [New Date];\n- Reason: [Brief explanation].\n\nThank you for your consideration.\n\nBest regards,\n[Name]", "az": "Mövzu: Təklif Müddətinin Uzadılması\n\nHörmətli cənab/xanım,\n\n[Tender İstinadı] üçün təklif son tarixinin uzadılmasını xahiş edirik.\n\nUzatma Məlumatları:\n\n- Cari Son Tarix: [Cari Tarix];\n- Təklif Edilən Yeni Tarix: [Yeni Tarix];\n- Səbəb: [Qısa izahat].\n\nHörmətlə,\n[Ad]"}, {"id": 22, "title": "Supplier Performance Review", "titleAz": "Təchizatçı Qiymətləndirməsi", "en": "Subject: Supplier Performance Review\n\nDear Sir/Madam,\n\nPlease find your performance rating for [Period] below.\n\nPerformance Summary:\n\n- Overall Rating: [Rating]/5;\n- Quality: [Score]/5;\n- Delivery: [Score]/5;\n- Pricing: [Score]/5;\n- Responsiveness: [Score]/5;\n- Documentation: [Score]/5.\n\nWe value our partnership and encourage continued improvement.\n\nBest regards,\n[Name]", "az": "Mövzu: Təchizatçı Qiymətləndirməsi\n\nHörmətli cənab/xanım,\n\n[Dövr] üçün performans reytinqiniz aşağıda təqdim olunur.\n\nPerformans Xülasəsi:\n\n- Ümumi Reytinq: [Reytinq]/5;\n- Keyfiyyət: [Bal]/5;\n- Çatdırılma: [Bal]/5;\n- Qiymət: [Bal]/5;\n- Ünsiyyət: [Bal]/5;\n- Sənədləşdirmə: [Bal]/5.\n\nƏməkdaşlığımızı dəyərləndirir və davamlı inkişafı dəstəkləyirik.\n\nHörmətlə,\n[Ad]"}, {"id": 23, "title": "Contract Agreement", "titleAz": "Müqavilə Razılaşması", "en": "Subject: Contract Agreement\n\nDear Sir/Madam,\n\nPlease find the contract for [Project Name] attached.\n\nContract Details:\n\n- Project: [Project Name];\n- Contract Value: [Amount];\n- Duration: [Start Date] - [End Date];\n- Signing Deadline: [Date].\n\nKindly review and return the signed copy by the specified deadline.\n\nWe look forward to a successful partnership.\n\nBest regards,\n[Name]", "az": "Mövzu: Müqavilə Razılaşması\n\nHörmətli cənab/xanım,\n\n[Layihə Adı] üçün müqavilə əlavə olunur.\n\nMüqavilə Məlumatları:\n\n- Layihə: [Layihə Adı];\n- Müqavilə Dəyəri: [Məbləğ];\n- Müddət: [Başlanğıc Tarix] - [Bitmə Tarixi];\n- İmza Son Tarixi: [Tarix].\n\nİmzalayıb göstərilən tarixə qədər qaytarın.\n\nUğurlu əməkdaşlıq ümidi ilə.\n\nHörmətlə,\n[Ad]"}, {"id": 24, "title": "Export Documents", "titleAz": "İxrac Sənədləri", "en": "Subject: Export Documents Request\n\nDear Sir/Madam,\n\nPlease provide the following documents for shipment [Order Reference]:\n\nRequired Documents:\n\n- Certificate of Origin;\n- Bill of Lading;\n- Packing List;\n- Commercial Invoice;\n- Insurance Certificate.\n\nDocuments are needed by [Date] for customs clearance.\n\nThank you.\n\nBest regards,\n[Name]", "az": "Mövzu: İxrac Sənədləri Sorğusu\n\nHörmətli cənab/xanım,\n\n[Sifariş İstinadı] üçün aşağıdakı sənədləri təqdim edin:\n\nTələb Olunan Sənədlər:\n\n- Mənşə Şəhadətnaməsi;\n- Koşiment;\n- Paket Siyahısı;\n- Kommersiya Fakturası;\n- Sığorta Şəhadətnaməsi.\n\nSənədlər [Tarix] tarixinə qədər gömrük rəsmiləşdirilməsi üçün tələb olunur.\n\nHörmətlə,\n[Ad]"}, {"id": 25, "title": "Tender Submission", "titleAz": "Tender Təqdimatı", "en": "Subject: Tender Submission\n\nDear Sir/Madam,\n\nWe submit our bid for [Tender Reference]. Please find attached our technical and commercial proposal.\n\nSubmission Details:\n\n- Tender Reference: [Reference];\n- Offer Validity: Until [Date];\n- Bid Bond: [Amount] (if applicable).\n\nWe look forward to your evaluation.\n\nBest regards,\n[Name]", "az": "Mövzu: Tender Təqdimatı\n\nHörmətli cənab/xanım,\n\n[Tender İstinadı] üçün təklifimizi təqdim edirik. Texniki və kommersiya təklifi əlavə olunur.\n\nTəqdimat Məlumatları:\n\n- Tender İstinadı: [İstinad];\n- Təklifin Qüvvə Müddəti: [Tarix] tarixinə qədər;\n- Təminat Məbləği: [Məbləğ] (varsa).\n\nQiymətləndirmənizi gözləyirik.\n\nHörmətlə,\n[Ad]"}, {"id": 26, "title": "Credit Application", "titleAz": "Kredit Müraciəti", "en": "Subject: Credit Application\n\nDear Sir/Madam,\n\nWe wish to apply for a credit account with your company. Please review the attached financial documents and references.\n\nApplication Details:\n\n- Company: [Company Name];\n- Requested Limit: [Amount];\n- Proposed Terms: [Payment Terms];\n- Trade References: [Reference Names].\n\nWe look forward to your response.\n\nBest regards,\n[Name]", "az": "Mövzu: Kredit Müraciəti\n\nHörmətli cənab/xanım,\n\nŞirkətinizdə kredit hesabı açmaq üçün müraciət edirik. Maliyyə sənədlərimiz və istinadlarımız əlavə olunur.\n\nMüraciət Məlumatları:\n\n- Şirkət: [Şirkət Adı];\n- Tələb olunan Limit: [Məbləğ];\n- Təklif olunan Şərtlər: [Ödəniş Şərtləri];\n- Ticarət İstinadları: [İstinad Adları].\n\nHörmətlə,\n[Ad]"}];
