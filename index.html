<!DOCTYPE html>
<html lang="en">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TemplateOG</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,Cantarell,'Helvetica Neue',Arial,sans-serif;background:#f0f2f5;color:#1a1a2e;min-height:100vh;font-size:16px;line-height:1.5}
header{background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);color:#fff;text-align:center;padding:2.5rem 1rem;box-shadow:0 4px 20px rgba(0,0,0,0.15)}
header h1{font-size:3rem;font-weight:800;letter-spacing:2px;background:linear-gradient(90deg,#e94560,#f5a623,#e94560);background-size:200% auto;-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;animation:s 3s ease-in-out infinite}
@keyframes s{0%,100%{background-position:0% center}50%{background-position:100% center}}
header p{margin-top:0.5rem;font-size:1rem;opacity:.85;font-weight:300}
.c{max-width:1000px;margin:0 auto;padding:2rem 1rem 4rem}
.g{display:flex;flex-direction:column;gap:.85rem}
.tc{background:#fff;border-radius:12px;box-shadow:0 1px 8px rgba(0,0,0,.05);overflow:hidden;border:1px solid #e8ecf0}
.th{padding:1rem 1.4rem;cursor:pointer;display:flex;justify-content:space-between;align-items:center;background:#fafbfc;border-bottom:1px solid #e8ecf0;user-select:none;transition:background .15s}
.th:hover{background:#f0f2f5}
.th .no{display:inline-flex;width:30px;height:30px;background:#0f3460;color:#fff;border-radius:50%;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;margin-right:10px;flex-shrink:0}
.th .tg{display:flex;align-items:center;gap:6px;flex:1;flex-wrap:wrap}
.th .tm{font-size:1rem;font-weight:600;color:#1a1a2e}
.th .li{display:flex;gap:5px}
.th .lb{font-size:.65rem;padding:2px 7px;border-radius:20px;font-weight:600;text-transform:uppercase}
.lb.e{background:#e3f2fd;color:#1565c0}
.lb.a{background:#fce4ec;color:#c62828}
.th .ar{font-size:1rem;color:#bbb;transition:transform .3s;margin-left:10px;flex-shrink:0}
.open .ar{transform:rotate(180deg);color:#e94560}
.tb{max-height:0;overflow:hidden;transition:max-height .5s ease,padding .3s ease;padding:0 1.4rem}
.open .tb{max-height:2000px;padding:1.4rem}
.ls{margin-bottom:1rem}
.ls:last-child{margin-bottom:0}
.lsh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.4rem;flex-wrap:wrap;gap:6px}
.lsh .ll{font-weight:700;font-size:.8rem;text-transform:uppercase;letter-spacing:.5px}
.lsh .ll.el{color:#1565c0}
.lsh .ll.al{color:#c62828}
.cb{display:inline-flex;align-items:center;gap:4px;padding:5px 12px;border:none;border-radius:6px;cursor:pointer;font-size:.78rem;font-weight:600;transition:all .15s;background:#e8ecf0;color:#444}
.cb:hover{background:#d0d4d8;transform:translateY(-1px)}
.cb.ok{background:#4caf50;color:#fff;transform:none}
.cb svg{width:13px;height:13px}
.ec{background:#fafbfd;border-radius:12px;padding:1.6rem 2rem;font-size:.95rem;line-height:2;white-space:pre-wrap;font-family:'Georgia','Times New Roman',serif;border-left:5px solid #e94560;border-top:1px solid #eaedf2;border-right:1px solid #eaedf2;border-bottom:1px solid #eaedf2;color:#1e293b;box-shadow:0 3px 12px rgba(0,0,0,.04);letter-spacing:.015em}
.ft{text-align:center;padding:2rem;color:#999;font-size:.82rem;border-top:1px solid #e0e3e7;margin-top:1rem}
@media(max-width:600px){header h1{font-size:2.2rem}header p{font-size:.9rem}.th{flex-wrap:wrap;gap:6px}.th .tm{font-size:.9rem}.th .no{width:26px;height:26px;font-size:.7rem}.ec{font-size:.85rem;padding:1rem 1.2rem}.tb{padding:0 1rem}.open .tb{padding:1rem}}
</style>
</head>

<script>
var D=[
  {
    "id": 1,
    "title": "Request for Product Quotation",
    "titleAz": "Məhsul Üçün Qiymət Təklifi Sorğusu",
    "en": "Subject: Request for Product Quotation\n\nDear Sir/Madam,\n\nPlease review the attached document and provide a quotation for a product that meets the specified parameters.\n\nAdditionally, please advise:\n\n- Whether the product is available in stock;\n- Delivery options to Azerbaijan by air and road freight;\n- Manufacturing/lead time;\n- Estimated delivery time.\n\nWe look forward to your quotation.\n\nBest regards,\n[Your Name]\n[Company Name]",
    "az": "Mövzu: Məhsul Üçün Qiymət Təklifi Sorğusu\n\nHörmətli cənab/xanım,\n\nƏlavə olunmuş sənədi nəzərdən keçirib göstərilən parametrlərə uyğun məhsul üçün qiymət təklifi təqdim edəsiniz.\n\nƏlavə olaraq, aşağıdakıları bildirəsiniz:\n\n- Məhsulun stokda olub-olmaması;\n- Azərbaycana hava və quru yolu ilə çatdırılma variantları;\n- İstehsal/çatdırılma müddəti;\n- Təxmini çatdırılma vaxtı.\n\nQiymət təklifinizi gözləyirik.\n\nHörmətlə,\n[Adınız]\n[Şirkət Adı]"
  },
  {
    "id": 2,
    "title": "Alternative Item Inquiry",
    "titleAz": "Alternativ Məhsul Sorğusu",
    "en": "Subject: Alternative Item Inquiry\n\nDear Sir/Madam,\n\nPlease confirm if an alternative item is acceptable for your requirement.\n\nAdditionally, please advise:\n\n- Specifications of the preferred alternative;\n- Quantity required;\n- Expected delivery timeline.\n\nWe look forward to your feedback.\n\nBest regards,\n[Name]",
    "az": "Mövzu: Alternativ Məhsul Sorğusu\n\nHörmətli cənab/xanım,\n\nAlternativ məhsulun tələbinizə uyğun olub-olmadığını təsdiqləyin.\n\nƏlavə olaraq, aşağıdakıları bildirəsiniz:\n\n- Üstünlük verilən alternativin xüsusiyyətləri;\n- Tələb olunan miqdar;\n- Gözlənilən çatdırılma müddəti.\n\nCavabınızı gözləyirik.\n\nHörmətlə,\n[Ad]"
  },
  {
    "id": 3,
    "title": "Best Price Request",
    "titleAz": "Ən Yaxşı Qiymət Tələbi",
    "en": "Subject: Best Price Request\n\nDear Sir/Madam,\n\nThank you for your quotation. Kindly review and provide your best possible price to support our approval process.\n\nAdditionally, please confirm:\n\n- Validity period of the offered price;\n- Any volume discount available;\n- Payment terms and conditions.\n\nWe look forward to your revised offer.\n\nBest regards,\n[Name]",
    "az": "Mövzu: Ən Yaxşı Qiymət Tələbi\n\nHörmətli cənab/xanım,\n\nTəklifinizə görə təşəkkür edirik. Zəhmət olmasa, ən sərfəli qiymətinizi təqdim edin.\n\nƏlavə olaraq, aşağıdakıları təsdiqləyin:\n\n- Təklif olunan qiymətin qüvvə müddəti;\n- Həcm endirimi imkanı;\n- Ödəniş şərtləri.\n\nYenilənmiş təklifinizi gözləyirik.\n\nHörmətlə,\n[Ad]"
  },
  {
    "id": 4,
    "title": "Final Offer Request",
    "titleAz": "Son Qiymət Təklifi",
    "en": "Subject: Final Offer Request\n\nDear Sir/Madam,\n\nPlease provide your final commercial offer at your earliest convenience to proceed with our internal process.\n\nAdditionally, please specify:\n\n- Unit price and total amount;\n- Delivery terms (Incoterms);\n- Payment terms;\n- Offer validity.\n\nThank you for your cooperation.\n\nBest regards,\n[Name]",
    "az": "Mövzu: Son Qiymət Təklifi\n\nHörmətli cənab/xanım,\n\nDaxili prosesimizi davam etdirmək üçün son qiymət təklifinizi mümkün qədər tez təqdim edin.\n\nƏlavə olaraq, aşağıdakıları qeyd edin:\n\n- Vahid qiyməti və ümumi məbləğ;\n- Çatdırılma şərtləri (Incoterms);\n- Ödəniş şərtləri;\n- Təklifin qüvvə müddəti.\n\nƏməkdaşlığınız üçün təşəkkür edirik.\n\nHörmətlə,\n[Ad]"
  },
  {
    "id": 5,
    "title": "Delivery Time Inquiry",
    "titleAz": "Çatdırılma Müddəti Sorğusu",
    "en": "Subject: Delivery Time Inquiry\n\nDear Sir/Madam,\n\nPlease provide the delivery time and confirm the shipping schedule for our order.\n\nAdditionally, please advise:\n\n- Estimated dispatch date;\n- Expected arrival date;\n- Shipping method and tracking details.\n\nYour prompt response will help us proceed efficiently.\n\nThank you.\n\nBest regards,\n[Name]",
    "az": "Mövzu: Çatdırılma Müddəti Sorğusu\n\nHörmətli cənab/xanım,\n\nSifarişimizin çatdırılma müddətini bildirin və göndərmə cədvəlini təsdiqləyin.\n\nƏlavə olaraq, aşağıdakıları bildirəsiniz:\n\n- Təxmini göndərmə tarixi;\n- Gözlənilən gəliş tarixi;\n- Daşıma üsulu və izləmə məlumatları.\n\nTez cavabınız proseslərimizi sürətləndirəcək.\n\nHörmətlə,\n[Ad]"
  },
  {

    "titleAz": "Stok Mövcudluğu Sorğusu",
    "en": "Subject: Stock Availability Inquiry\n\nDear Sir/Madam,\n\nPlease advise the current stock availability for the items below and confirm the lead time.\n\nAdditionally, please confirm:\n\n- Available quantity in stock;\n- Expected restock date (if out of stock);\n- Minimum order quantity.\n\nWe look forward to your update.\n\nBest regards,\n[Name]",
    "az": "Mövzu: Stok Mövcudluğu Sorğusu\n\nHörmətli cənab/xanım,\n\nMəhsulların hazırda stok mövcudluğunu və təslim müddətini bildirin.\n\nƏlavə olaraq, aşağıdakıları təsdiqləyin:\n\n- Stokda olan miqdar;\n- Stok yoxdursa, təxmini yenilənmə tarixi;\n- Minimum sifariş miqdarı.\n\nCavabınızı gözləyirik.\n\nHörmətlə,\n[Ad]"
  },
  {
    "id": 7,
    "title": "Offer Rejection",
    "titleAz": "Təklifin Rəddi",
    "en": "Subject: Offer Rejection\n\nDear Sir/Madam,\n\nThank you for your offer. After review, we regret to inform you that we are unable to proceed with your proposal at this time.\n\nPlease note:\n\n- We may revisit this in future tenders;\n- We encourage you to participate in upcoming opportunities.\n\nWe hope to collaborate on future projects.\n\nBest regards,\n[Name]",
    "az": "Mövzu: Təklifin Rəddi\n\nHörmətli cənab/xanım,\n\nTəklifinizə görə təşəkkür edirik. Təəssüflə bildiririk ki, hazırki mərhələdə təklifinizi qəbul edə bilmirik.\n\nQeyd edək:\n\n- Gələcək tenderlərdə yenidən qiymətləndirə bilərik;\n- Qarşıdan gələn fürsətlərdə iştirakınızı tövsiyə edirik.\n\nGələcək layihələrdə əməkdaşlıq ümidi ilə.\n\nHörmətlə,\n[Ad]"
  },
  {
    "id": 8,
    "title": "Warranty Claim",
    "titleAz": "Zəmanət Müraciəti",
    "en": "Subject: Warranty Claim\n\nDear Sir/Madam,\n\nWe wish to file a warranty claim regarding the product below. Please advise on the required steps and documentation.\n\nProduct Details:\n\n- Product: [Product Name]\n- Invoice: [Invoice Number]\n- Issue: [Description]\n\nWe look forward to your guidance.\n\nBest regards,\n[Name]",
    "az": "Mövzu: Zəmanət Müraciəti\n\nHörmətli cənab/xanım,\n\nAşağıdakı məhsul üçün zəmanət müraciəti etmək istəyirik. Tələb olunan addımları və sənədləri bildirin.\n\nMəhsul Məlumatları:\n\n- Məhsul: [Məhsul Adı]\n- Faktura: [Faktura Nömrəsi]\n- Problem: [Təsvir]\n\nHörmətlə,\n[Ad]"
  },
  {
    "id": 9,
    "title": "Quality Complaint",
    "titleAz": "Keyfiyyət Şikayəti",
    "en": "Subject: Quality Complaint\n\nDear Sir/Madam,\n\nWe regret to report a quality issue with the delivered product. Please find the details below and advise on corrective action.\n\nOrder Details:\n\n- Order: [Order Number]\n- Issue: [Description]\n- Affected Quantity: [Quantity]\n\nWe kindly request a replacement or refund as per the agreement.\n\nBest regards,\n[Name]",
    "az": "Mövzu: Keyfiyyət Şikayəti\n\nHörmətli cənab/xanım,\n\nTəəssüflə bildiririk ki, çatdırılan məhsulda keyfiyyət problemi aşkar edilmişdir.\n\nSifariş Məlumatları:\n\n- Sifariş: [Sifariş Nömrəsi]\n- Problem: [Təsvir]\n- Təsir edən miqdar: [Miqdar]\n\nRazılaşmaya əsasən dəyişdirilmə və ya geri qaytarılma xahiş edirik.\n\nHörmətlə,\n[Ad]"

  {
    "id": 10,

    "titleAz": "Təchizatçı Qeydiyyatı",
    "en": "Subject: Supplier Registration Request\n\nDear Sir/Madam,\n\nWe would like to register your company as a potential supplier in our procurement system.\n\nPlease provide the following documents:\n\n- Company profile and catalogue;\n- Tax registration certificate;\n- Quality certifications (ISO, etc.);\n- Bank details;\n- Reference list.\n\nWe look forward to a mutually beneficial partnership.\n\nBest regards,\n[Name]",
    "az": "Mövzu: Təchizatçı Qeydiyyatı Sorğusu\n\nHörmətli cənab/xanım,\n\nŞirkətinizi potensial təchizatçı kimi qeydiyyatdan keçirmək istəyirik.\n\nAşağıdakı sənədləri təqdim edəsiniz:\n\n- Şirkət profili və kataloqu;\n- Vergi qeydiyyat şəhadətnaməsi;\n- Keyfiyyət sertifikatları (ISO və s.);\n- Bank məlumatları;\n- İstinad siyahısı.\n\nQarşılıqlı faydalı əməkdaşlıq ümidi ilə.\n\nHörmətlə,\n[Ad]"
  },
  {
    "id": 11,
    "title": "Inquiry Follow-Up",
    "titleAz": "Sorğu Təkibi",

    "az": "Mövzu: Sorğu Təkibi\n\nHörmətli cənab/xanım,\n\n[Tarix] tarixində məhsul sorğusu göndərmişdik. Vəziyyəti barədə məlumat verəsiniz.\n\nTəsdiqləyin:\n\n- Qiymət təklifinin hazırlanıb-hazırlanmadığı;\n- Əlavə məlumata ehtiyac olub-olmaması.\n\nTez cavabınızı gözləyirik.\n\nHörmətlə,\n[Ad]"

  {
    "id": 12,

    "az": "Mövzu: Sifariş Təsdiqi\n\nHörmətli cənab/xanım,\n\nRazılaşdırılmış şərtlərə əsasən sifarişimizi təsdiq edirik.\n\nSifariş Xülasəsi:\n\n- Sifariş İstinadı: [Sifariş Nömrəsi]\n- Məhsul: [Məhsul Adı]\n- Miqdar: [Miqdar]\n- Vahid Qiyməti: [Qiymət]\n- Ümumi Məbləğ: [Məbləğ]\n- Çatdırılma Tarixi: [Tarix]\n\nProforma fakturanı göndərib göndərmə cədvəlini təsdiqləyin.\n\nHörmətlə,\n[Ad]"

  {

    "title": "Shipping Instruction",

    "az": "Mövzu: Göndəriş Təlimatı\n\nHörmətli cənab/xanım,\n\nAşağıdakı sifarişin göndərilməsini təşkil edəsiniz.\n\nGöndəriş Məlumatları:\n\n- Sifariş İstinadı: [Sifariş Nömrəsi];\n- Daşıma Üsulu: [Hava / Quru / Dəniz];\n- Təyinat: [Ünvan];\n- Tələb olunan çatdırılma tarixi: [Tarix].\n\nGöndəriş təşkilatını təsdiqləyib izləmə məlumatını təqdim edin.\n\nHörmətlə,\n[Ad]"

    "titleAz": "Ödəniş Xatırlatması",

  {

    "en": "Subject: Invoice Correction Request\n\nDear Sir/Madam,\n\nWe have identified a discrepancy in the invoice [Invoice Number]. Please find the details below and issue a corrected invoice.\n\nDiscrepancy Details:\n\n- Invoice Item: [Item];\n- Incorrect Value: [Value];\n- Correct Value: [Correct Value].\n\nWe kindly request a credit note or revised invoice at your earliest convenience.\n\nBest regards,\n[Name]",

  {
    "id": 17,

    "titleAz": "Sifariş Ləğvi",
