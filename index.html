<title>TemplateOG</title>
<style>*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f4f7fc;--card:#fff;--primary:#0b1e3a;--accent:#1a5bff;--accent2:#3b7bff;--accent3:#0d47d0;--border:#dce3ef;--text:#1a2332;--muted:#5e6f8d;--radius:14px;--shadow:0 2px 12px rgba(26,91,255,.06)}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Oxygen,Ubuntu,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;line-height:1.7;-webkit-font-smoothing:antialiased}
header{background:linear-gradient(135deg,#0b1e3a 0%,#0f2a5a 40%,#1a5bff 100%);color:#fff;padding:3.5rem 2rem 2.5rem;text-align:center;position:relative;overflow:hidden}
header::before{content:'';position:absolute;top:-60%;left:-30%;width:160%;height:200%;background:radial-gradient(ellipse at 40% 50%,rgba(255,255,255,.06) 0%,transparent 60%);pointer-events:none}
header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:5px;background:linear-gradient(90deg,transparent,#60a5fa,#93c5fd,#60a5fa,transparent)}
header h1{font-size:2.6rem;font-weight:800;letter-spacing:-.5px;margin-bottom:.3rem;position:relative}
header p{font-size:1.05rem;opacity:.6;font-weight:400;position:relative}
.controls{background:#fff;padding:1rem 2rem;display:flex;align-items:center;justify-content:center;gap:1rem;flex-wrap:wrap;border-bottom:1px solid var(--border);position:sticky;top:0;z-index:100;box-shadow:0 1px 6px rgba(0,0,0,.04)}
.search-wrap{position:relative;flex:1;max-width:520px;min-width:220px}
.search-wrap svg{position:absolute;left:15px;top:50%;transform:translateY(-50%);width:17px;height:17px;color:var(--muted);pointer-events:none}
.search-wrap input{width:100%;padding:.7rem 1rem .7rem 2.5rem;border:2px solid var(--border);border-radius:12px;font-size:.9rem;outline:none;transition:all .2s;background:var(--bg);color:var(--text)}
.search-wrap input:focus{border-color:var(--accent);box-shadow:0 0 0 4px rgba(26,91,255,.1);background:#fff}
.stats{font-size:.85rem;color:var(--muted);white-space:nowrap;font-weight:500}
.c{max-width:860px;margin:0 auto;padding:1.5rem 1.5rem 3rem;display:flex;flex-direction:column;gap:10px}
.tc{background:var(--card);border-radius:var(--radius);overflow:hidden;border:1px solid var(--border);transition:all .2s}
.tc:hover{box-shadow:0 4px 24px rgba(26,91,255,.08);border-color:#bed9ff}
.th{padding:.85rem 1.3rem;cursor:pointer;display:flex;align-items:center;gap:12px;background:var(--card);user-select:none;-webkit-tap-highlight-color:transparent;transition:background .15s}
.th:hover{background:#fafcff}
.th:active{background:#f0f5ff}
.open .th{background:#f7faff;border-bottom:1px solid var(--border)}
.th .no{display:inline-flex;width:32px;height:32px;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;border-radius:10px;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;transition:all .25s;box-shadow:0 2px 6px rgba(26,91,255,.2)}
.open .th .no{background:linear-gradient(135deg,var(--accent3),var(--accent));box-shadow:0 3px 10px rgba(26,91,255,.35);transform:scale(1.05)}
.th .tm{font-size:.92rem;font-weight:600;flex:1;color:var(--primary);line-height:1.4}
.th .li{display:flex;gap:5px;flex-shrink:0}
.th .lb{font-size:.55rem;padding:2px 9px;border-radius:20px;font-weight:700;letter-spacing:.4px;text-transform:uppercase}
.lb.e{background:#dbeafe;color:#1d4ed8}
.lb.a{background:#ede9fe;color:#5b21b6}
.th .ar{font-size:.85rem;color:#a0b9e0;transition:all .3s;flex-shrink:0;width:22px;text-align:center}
.open .ar{transform:rotate(180deg);color:var(--accent)}
.tb{max-height:0;overflow:hidden;transition:max-height .4s ease,padding .25s ease;padding:0 1.3rem}
.open .tb{max-height:3000px;padding:.9rem 1.3rem 1rem}
.ls{margin-bottom:.6rem}
.ls:last-child{margin-bottom:0}
.lsh{display:flex;justify-content:space-between;align-items:center;margin-bottom:.35rem;flex-wrap:wrap;gap:4px}
.lsh .ll{font-weight:700;font-size:.7rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted)}
.cb{display:inline-flex;align-items:center;gap:5px;padding:5px 14px;border:none;border-radius:8px;cursor:pointer;font-size:.7rem;font-weight:600;transition:all .15s;background:#f1f5f9;color:#475569;font-family:inherit}
.cb:hover{background:#e2e8f0;transform:translateY(-1px)}
.cb.ok{background:#059669;color:#fff;transform:none}
.cb svg{width:12px;height:12px}
.ec{background:#fafcff;border-radius:10px;padding:.7rem 1.1rem;font-size:.88rem;line-height:1.8;white-space:pre-wrap;font-family:Georgia,'Times New Roman',serif;border-left:4px solid var(--accent);border:1px solid var(--border);border-left-width:4px;color:var(--text)}.ft{text-align:center;padding:2rem;color:#94a3b8;font-size:.8rem;border-top:1px solid var(--border);background:#fff}
.empty-state{text-align:center;padding:3rem 1rem;color:var(--muted)}
.empty-state svg{width:44px;height:44px;margin-bottom:.8rem;opacity:.35}
.empty-state p{font-size:.9rem}
@media(max-width:640px){header{padding:2rem 1rem 1.5rem}header h1{font-size:1.6rem}header p{font-size:.9rem}.controls{padding:.7rem 1rem;gap:.6rem}.search-wrap{max-width:100%;min-width:0}.stats{font-size:.78rem}.c{padding:1rem 1rem 2rem;gap:8px}.th{padding:.65rem 1rem;gap:8px}.th .no{width:28px;height:28px;font-size:.7rem;border-radius:8px}.th .tm{font-size:.85rem}.th .lb{font-size:.5rem;padding:1px 7px}.open .tb{padding:.7rem 1rem}.ec{font-size:.82rem;padding:.5rem .9rem;line-height:1.7;border-radius:8px;border-left-width:3px}.ft{padding:1.5rem}}</style>
</head>

<script>
var D=[{"id": 1, "title": "Request for Product Quotation", "titleAz": "Məhsul Üçün Qiymət Təklifi Sorğusu", "en": "Subject: Request for Product Quotation\n\nDear Sir/Madam,\n\nPlease review the attached document and provide a quotation for a product that meets the specified parameters.\n\nAdditionally, please advise:\n\n- Whether the product is available in stock;\n- Delivery options to Azerbaijan by air and road freight;\n- Manufacturing/lead time;\n- Estimated delivery time.\n\nWe look forward to your quotation.\n\nBest regards,\n[Your Name]\n[Company Name]", "az": "Mövzu: Məhsul Üçün Qiymət Təklifi Sorğusu\n\nHörmətli cənab/xanım,\n\nƏlavə olunmuş sənədi nəzərdən keçirib göstərilən parametrlərə uyğun məhsul üçün qiymət təklifi təqdim edəsiniz.\n\nƏlavə olaraq, aşağıdakıları bildirəsiniz:\n\n- Məhsulun stokda olub-olmaması;\n- Azərbaycana hava və quru yolu ilə çatdırılma variantları;\n- İstehsal/çatdırılma müddəti;\n- Təxmini çatdırılma vaxtı.\n\nQiymət təklifinizi gözləyirik.\n\nHörmətlə,\n[Adınız]\n[Şirkət Adı]"}, {"id": 2, "title": "Alternative Item Inquiry", "titleAz": "Alternativ Məhsul Sorğusu", "en": "Subject: Alternative Item Inquiry\n\nDear Sir/Madam,\n\nPlease confirm if an alternative item is acceptable for our requirement.\n\nWe look forward to your feedback.\n\nBest regards,\n[Name]", "az": "Mövzu: Alternativ Məhsul Sorğusu\n\nHörmətli cənab/xanım,\n\nAlternativ məhsulun tələbimizə uyğun olub-olmadığını təsdiqləyin.\n\nCavabınızı gözləyirik.\n\nHörmətlə,\n[Ad]"}, {"id": 3, "title": "Best Price Request", "titleAz": "Ən Yaxşı Qiymət Tələbi", "en": "Subject: Best Price Request\n\nDear Sir/Madam,\n\nThank you for your quotation. Kindly provide your best possible price for approval.\n\nWe look forward to your revised offer.\n\nBest regards,\n[Name]", "az": "Mövzu: Ən Yaxşı Qiymət Tələbi\n\nHörmətli cənab/xanım,\n\nTəklifinizə görə təşəkkür edirik. Zəhmət olmasa, ən sərfəli qiymətinizi təqdim edin.\n\nYenilənmiş təklifinizi gözləyirik.\n\nHörmətlə,\n[Ad]"}, {"id": 4, "title": "Final Offer Request", "titleAz": "Son Qiymət Təklifi", "en": "Subject: Final Offer Request\n\nDear Sir/Madam,\n\nPlease provide your final commercial offer to proceed with our process.\n\nThank you for your cooperation.\n\nBest regards,\n[Name]", "az": "Mövzu: Son Qiymət Təklifi\n\nHörmətli cənab/xanım,\n\nDaxili prosesimiz üçün son qiymət təklifinizi təqdim edin.\n\nƏməkdaşlığınız üçün təşəkkür edirik.\n\nHörmətlə,\n[Ad]"}, {"id": 5, "title": "Delivery Time Inquiry", "titleAz": "Çatdırılma Müddəti Sorğusu", "en": "Subject: Delivery Time Inquiry\n\nDear Sir/Madam,\n\nPlease provide the delivery time and shipping schedule for our order.\n\nThank you.\n\nBest regards,\n[Name]", "az": "Mövzu: Çatdırılma Müddəti Sorğusu\n\nHörmətli cənab/xanım,\n\nSifarişimizin çatdırılma müddətini və göndərmə cədvəlini bildirin.\n\nHörmətlə,\n[Ad]"}, {"id": 6, "title": "Stock Availability Inquiry", "titleAz": "Stok Mövcudluğu Sorğusu", "en": "Subject: Stock Availability Inquiry\n\nDear Sir/Madam,\n\nPlease advise the current stock availability and lead time for the items below.\n\nWe look forward to your update.\n\nBest regards,\n[Name]", "az": "Mövzu: Stok Mövcudluğu Sorğusu\n\nHörmətli cənab/xanım,\n\nMəhsulların stok mövcudluğunu və təslim müddətini bildirin.\n\nCavabınızı gözləyirik.\n\nHörmətlə,\n[Ad]"}, {"id": 7, "title": "Offer Rejection", "titleAz": "Təklifin Rəddi", "en": "Subject: Offer Rejection\n\nDear Sir/Madam,\n\nThank you for your offer. After review, we regret that we are unable to proceed with your proposal at this time.\n\nWe hope to collaborate on future opportunities.\n\nBest regards,\n[Name]", "az": "Mövzu: Təklifin Rəddi\n\nHörmətli cənab/xanım,\n\nTəklifinizə görə təşəkkür edirik. Təəssüflə bildiririk ki, hazırki mərhələdə təklifinizi qəbul edə bilmirik.\n\nGələcək əməkdaşlıq ümidi ilə.\n\nHörmətlə,\n[Ad]"}, {"id": 8, "title": "Warranty Claim", "titleAz": "Zəmanət Müraciəti", "en": "Subject: Warranty Claim\n\nDear Sir/Madam,\n\nWe wish to file a warranty claim for the product below.\n\nProduct: [Product Name]\nInvoice: [Invoice Number]\nIssue: [Description]\n\nPlease advise on the required steps.\n\nBest regards,\n[Name]", "az": "Mövzu: Zəmanət Müraciəti\n\nHörmətli cənab/xanım,\n\nAşağıdakı məhsul üçün zəmanət müraciəti etmək istəyirik.\n\nMəhsul: [Məhsul Adı]\nFaktura: [Faktura Nömrəsi]\nProblem: [Təsvir]\n\nHörmətlə,\n[Ad]"}, {"id": 9, "title": "Quality Complaint", "titleAz": "Keyfiyyət Şikayəti", "en": "Subject: Quality Complaint\n\nDear Sir/Madam,\n\nWe regret to report a quality issue with the delivered product.\n\nOrder: [Order Number]\nIssue: [Description]\n\nWe kindly request a replacement or refund.\n\nBest regards,\n[Name]", "az": "Mövzu: Keyfiyyət Şikayəti\n\nHörmətli cənab/xanım,\n\nÇatdırılan məhsulda keyfiyyət problemi aşkar edilmişdir.\n\nSifariş: [Sifariş Nömrəsi]\nProblem: [Təsvir]\n\nDəyişdirilmə və ya geri qaytarılma xahiş edirik.\n\nHörmətlə,\n[Ad]"}, {"id": 10, "title": "Supplier Registration", "titleAz": "Təchizatçı Qeydiyyatı", "en": "Subject: Supplier Registration Request\n\nDear Sir/Madam,\n\nWe would like to register your company as a supplier in our system.\n\nPlease provide:\n- Company profile and catalogue\n- Tax registration certificate\n- Quality certifications\n- Bank details\n\nWe look forward to your response.\n\nBest regards,\n[Name]", "az": "Mövzu: Təchizatçı Qeydiyyatı Sorğusu\n\nHörmətli cənab/xanım,\n\nŞirkətinizi təchizatçı kimi qeydiyyatdan keçirmək istəyirik.\n\nZəhmət olmasa, aşağıdakıları təqdim edin:\n- Şirkət profili və kataloqu\n- Vergi qeydiyyat şəhadətnaməsi\n- Keyfiyyət sertifikatları\n- Bank məlumatları\n\nHörmətlə,\n[Ad]"}, {"id": 11, "title": "Inquiry Follow-Up", "titleAz": "Sorğu Təkibi", "en": "Subject: Inquiry Follow-Up\n\nDear Sir/Madam,\n\nWe previously sent an inquiry on [Date]. Kindly provide an update.\n\nWe look forward to your response.\n\nBest regards,\n[Name]", "az": "Mövzu: Sorğu Təkibi\n\nHörmətli cənab/xanım,\n\n[Tarix] tarixində sorğu göndərmişdik. Vəziyyəti barədə məlumat verəsiniz.\n\nCavabınızı gözləyirik.\n\nHörmətlə,\n[Ad]"}, {"id": 12, "title": "Order Confirmation", "titleAz": "Sifariş Təsdiqi", "en": "Subject: Order Confirmation\n\nDear Sir/Madam,\n\nWe are pleased to confirm our order as per agreed terms.\n\nOrder Reference: [Order Number]\nItem: [Product Name]\nQuantity: [Quantity]\nTotal Amount: [Total]\nDelivery Date: [Date]\n\nPlease confirm the shipping schedule.\n\nBest regards,\n[Name]", "az": "Mövzu: Sifariş Təsdiqi\n\nHörmətli cənab/xanım,\n\nRazılaşdırılmış şərtlərə əsasən sifarişimizi təsdiq edirik.\n\nSifariş İstinadı: [Sifariş Nömrəsi]\nMəhsul: [Məhsul Adı]\nMiqdar: [Miqdar]\nÜmumi Məbləğ: [Məbləğ]\nÇatdırılma Tarixi: [Tarix]\n\nGöndərmə cədvəlini təsdiqləyin.\n\nHörmətlə,\n[Ad]"}, {"id": 13, "title": "Shipping Instruction", "titleAz": "Göndəriş Təlimatı", "en": "Subject: Shipping Instruction\n\nDear Sir/Madam,\n\nPlease arrange shipment for the order below.\n\nOrder Reference: [Order Number]\nShipping Method: [Air / Road / Sea]\nDestination: [Address]\nRequired Date: [Date]\n\nPlease provide tracking information.\n\nThank you.\n\nBest regards,\n[Name]", "az": "Mövzu: Göndəriş Təlimatı\n\nHörmətli cənab/xanım,\n\nAşağıdakı sifarişin göndərilməsini təşkil edin.\n\nSifariş İstinadı: [Sifariş Nömrəsi]\nDaşıma Üsulu: [Hava / Quru / Dəniz]\nTəyinat: [Ünvan]\nTarix: [Tarix]\n\nİzləmə məlumatını təqdim edin.\n\nHörmətlə,\n[Ad]"}, {"id": 14, "title": "Payment Reminder", "titleAz": "Ödəniş Xatırlatması", "en": "Subject: Payment Reminder\n\nDear Sir/Madam,\n\nThis is a reminder for the outstanding payment on invoice [Invoice Number] dated [Date].\n\nAmount: [Amount]\nDue Date: [Due Date]\n\nPlease process the payment at your earliest convenience.\n\nBest regards,\n[Name]", "az": "Mövzu: Ödəniş Xatırlatması\n\nHörmətli cənab/xanım,\n\n[Tarix] tarixli [Faktura Nömrəsi] nömrəli faktura üzrə ödənişi xatırladırıq.\n\nMəbləğ: [Məbləğ]\nSon Tarix: [Tarix]\n\nÖdənişi həyata keçirməyinizi xahiş edirik.\n\nHörmətlə,\n[Ad]"}, {"id": 15, "title": "Invoice Correction", "titleAz": "Faktura Düzəlişi", "en": "Subject: Invoice Correction Request\n\nDear Sir/Madam,\n\nWe found a discrepancy in invoice [Invoice Number].\n\nItem: [Item]\nIncorrect: [Value]\nCorrect: [Correct Value]\n\nKindly issue a revised invoice.\n\nBest regards,\n[Name]", "az": "Mövzu: Faktura Düzəlişi Sorğusu\n\nHörmətli cənab/xanım,\n\n[Faktura Nömrəsi] nömrəli fakturada uyğunsuzluq aşkar etdik.\n\nMaddə: [Maddə]\nSəhv: [Dəyər]\nDüzgün: [Düzgün Dəyər]\n\nDüzəliş edilmiş faktura göndərin.\n\nHörmətlə,\n[Ad]"}, {"id": 16, "title": "Back Order", "titleAz": "Geri Sifariş", "en": "Subject: Back Order Notification\n\nDear Sir/Madam,\n\nThe following item from your order is currently out of stock and will be placed on back order.\n\nOrder Reference: [Order Number]\nItem: [Product Name]\nEstimated Restock: [Date]\n\nWe will notify you once available.\n\nBest regards,\n[Name]", "az": "Mövzu: Geri Sifariş Bildirişi\n\nHörmətli cənab/xanım,\n\nSifarişinizdəki məhsul hazırda stokda yoxdur və geri sifarişə qoyulmuşdur.\n\nSifariş: [Sifariş Nömrəsi]\nMəhsul: [Məhsul Adı]\nYenilənmə: [Tarix]\n\nMəlumat verəcəyik.\n\nHörmətlə,\n[Ad]"}, {"id": 17, "title": "Order Cancellation", "titleAz": "Sifariş Ləğvi", "en": "Subject: Order Cancellation\n\nDear Sir/Madam,\n\nDue to [Reason], we must cancel our order [Order Reference].\n\nPlease confirm the cancellation.\n\nBest regards,\n[Name]", "az": "Mövzu: Sifariş Ləğvi\n\nHörmətli cənab/xanım,\n\n[Səbəb] səbəbindən [Sifariş İstinadı] nömrəli sifarişimizi ləğv etməliyik.\n\nLəğvi təsdiqləyin.\n\nHörmətlə,\n[Ad]"}, {"id": 18, "title": "Late Delivery", "titleAz": "Gecikmiş Çatdırılma", "en": "Subject: Late Delivery Notification\n\nDear Sir/Madam,\n\nWe regret to inform you that delivery for order [Order Reference] is delayed.\n\nOriginal Date: [Original Date]\nRevised Date: [New Date]\n\nWe apologize for the inconvenience.\n\nBest regards,\n[Name]", "az": "Mövzu: Gecikmiş Çatdırılma Bildirişi\n\nHörmətli cənab/xanım,\n\n[Sifariş İstinadı] üzrə çatdırılmanın gecikdiyini bildiririk.\n\nPlanlaşdırılan: [Əvvəlki Tarix]\nYeni Tarix: [Yeni Tarix]\n\nNarahatlıq üçün üzr istəyirik.\n\nHörmətlə,\n[Ad]"}, {"id": 19, "title": "Sample Request", "titleAz": "Nümunə Tələbi", "en": "Subject: Sample Request\n\nDear Sir/Madam,\n\nPlease provide samples of the following products for evaluation.\n\n1. [Product 1]\n2. [Product 2]\n\nAdvise if any charges apply.\n\nBest regards,\n[Name]", "az": "Mövzu: Nümunə Tələbi\n\nHörmətli cənab/xanım,\n\nQiymətləndirmə üçün aşağıdakı məhsulların nümunələrini təqdim edin.\n\n1. [Məhsul 1]\n2. [Məhsul 2]\n\nHər hansı ödəniş varsa bildirin.\n\nHörmətlə,\n[Ad]"}, {"id": 20, "title": "Price Revision", "titleAz": "Qiymət Yeniləməsi", "en": "Subject: Price Revision Request\n\nDear Sir/Madam,\n\nDue to [reason], we request a revision of pricing for [Product Name].\n\nCurrent: [Current Price]\nProposed: [New Price]\n\nWe look forward to your response.\n\nBest regards,\n[Name]", "az": "Mövzu: Qiymət Yeniləmə Sorğusu\n\nHörmətli cənab/xanım,\n\n[Səbəb] səbəbindən [Məhsul Adı] üçün qiymət yeniləməsi xahiş edirik.\n\nCari: [Cari Qiymət]\nTəklif: [Yeni Qiymət]\n\nHörmətlə,\n[Ad]"}, {"id": 21, "title": "Bid Extension", "titleAz": "Təklif Müddətinin Uzadılması", "en": "Subject: Bid Extension Request\n\nDear Sir/Madam,\n\nWe request an extension for the bid deadline of [Tender Reference].\n\nCurrent Deadline: [Current Date]\nProposed: [New Date]\nReason: [Brief explanation]\n\nThank you.\n\nBest regards,\n[Name]", "az": "Mövzu: Təklif Müddətinin Uzadılması\n\nHörmətli cənab/xanım,\n\n[Tender İstinadı] üçün təklif son tarixinin uzadılmasını xahiş edirik.\n\nCari Tarix: [Cari Tarix]\nYeni Tarix: [Yeni Tarix]\nSəbəb: [Qısa izahat]\n\nHörmətlə,\n[Ad]"}, {"id": 22, "title": "Supplier Performance Review", "titleAz": "Təchizatçı Qiymətləndirməsi", "en": "Subject: Supplier Performance Review\n\nDear Sir/Madam,\n\nPlease find your performance rating for [Period] below.\n\nOverall Rating: [Rating]/5\n\nWe value our partnership.\n\nBest regards,\n[Name]", "az": "Mövzu: Təchizatçı Qiymətləndirməsi\n\nHörmətli cənab/xanım,\n\n[Dövr] üçün performans reytinqiniz aşağıdadır.\n\nÜmumi Reytinq: [Reytinq]/5\n\nƏməkdaşlığımızı dəyərləndiririk.\n\nHörmətlə,\n[Ad]"}, {"id": 23, "title": "Contract Agreement", "titleAz": "Müqavilə Razılaşması", "en": "Subject: Contract Agreement\n\nDear Sir/Madam,\n\nPlease find the contract for [Project Name] attached.\n\nContract Value: [Amount]\nDuration: [Start Date] - [End Date]\n\nKindly review and return the signed copy by [Date].\n\nBest regards,\n[Name]", "az": "Mövzu: Müqavilə Razılaşması\n\nHörmətli cənab/xanım,\n\n[Layihə Adı] üçün müqavilə əlavə olunur.\n\nMüqavilə Dəyəri: [Məbləğ]\nMüddət: [Başlanğıc Tarix] - [Bitmə Tarixi]\n\nİmzalayıb [Tarix] tarixinə qədər qaytarın.\n\nHörmətlə,\n[Ad]"}, {"id": 24, "title": "Export Documents", "titleAz": "İxrac Sənədləri", "en": "Subject: Export Documents Request\n\nDear Sir/Madam,\n\nPlease provide the following documents for shipment [Order Reference]:\n\n- Certificate of Origin\n- Bill of Lading\n- Packing List\n- Commercial Invoice\n- Insurance Certificate\n\nDocuments needed by [Date].\n\nThank you.\n\nBest regards,\n[Name]", "az": "Mövzu: İxrac Sənədləri Sorğusu\n\nHörmətli cənab/xanım,\n\n[Sifariş İstinadı] üçün aşağıdakı sənədləri təqdim edin:\n\n- Mənşə Şəhadətnaməsi\n- Koşiment\n- Paket Siyahısı\n- Kommersiya Fakturası\n- Sığorta Şəhadətnaməsi\n\nSənədlər [Tarix] tarixinə qədər lazımdır.\n\nHörmətlə,\n[Ad]"}, {"id": 25, "title": "Tender Submission", "titleAz": "Tender Təqdimatı", "en": "Subject: Tender Submission\n\nDear Sir/Madam,\n\nWe submit our bid for [Tender Reference]. Our proposal is attached.\n\nOffer valid until [Date].\n\nWe look forward to your evaluation.\n\nBest regards,\n[Name]", "az": "Mövzu: Tender Təqdimatı\n\nHörmətli cənab/xanım,\n\n[Tender İstinadı] üçün təklifimizi təqdim edirik. Təklif əlavə olunur
